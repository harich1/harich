<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARICH - Global Business Design</title>
<style>
    /* 1. 스크롤이 가능하도록 설정 (overflow: hidden 제거) */
    body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        background-color: #000; 
        /* overflow: hidden; <- 이 줄을 지우거나 주석 처리하세요 */
    }

    .bg-image {
        width: 100%; /* 가로 너비는 브라우저에 맞춤 */
        display: block; /* 이미지 아래 불필요한 공백 제거 */
    }

    img {
        width: 100%; /* 이미지 가로를 100%로 */
        height: auto; /* 세로는 이미지 비율에 맞춰 자동으로 (스크롤 생성) */
    }
</style>
</head>
<body>
    <img src="main1.JPG" alt="HARICH Main Visual">
</body>
</html>
