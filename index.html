<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HARICH - Global Business Design</title>
<style>
    /* 1. 전체 배경색을 검정(#000)에서 흰색(#fff)으로 변경 */
    body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        background-color: #ffffff; /* 흰색으로 변경 */
    }

    /* 2. 이미지 설정 (그대로 유지) */
    picture img {
        width: 100%;
        height: auto;
        display: block;
    }
</style>
</head>
<body>

    <picture>
        <source srcset="main_mo1.JPG" media="(max-width: 768px)">
        
        <img src="main1.JPG" alt="HARICH Business Design">
    </picture>

</body>
</html>
